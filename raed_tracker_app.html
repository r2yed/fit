<style>

@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap');

*{

  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

html{

  height:100%;
  overflow:hidden;
  background:#050816;
}

  --amber2:#FFD98A;

  --blue:#57A6FF;
  --blue2:#8FC5FF;

  --pink:#FF6FD8;

  --green:#38E89D;

  --red:#FF3E5B;

  position:relative;
}

      #00E5FF

}

.scroll{

  outline:none;
}

.overlay,
.fatigue-overlay{

  position:fixed;
  inset:0;

  background:
    rgba(0,0,0,.7);

  backdrop-filter:blur(14px);

  z-index:1000;
}

.sheet,
.fatigue-sheet,
.date-sheet{

  background:#101428;

  border-radius:32px 32px 0 0;

  padding:

.ex:hover,
.card:hover{
