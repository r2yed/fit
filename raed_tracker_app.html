<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RaedFit">
<meta name="theme-color" content="#091633">
<title>RaedFit</title>
<script>
(function(){
  function setAppHeight(){
    var inner = window.innerHeight || 0;
    var client = document.documentElement.clientHeight || 0;
    var screenH = (window.screen && window.screen.height) || 0;
    var h = Math.max(inner, client, screenH);
    document.documentElement.style.setProperty('--app-height', h + 'px');
  }
  setAppHeight();
  window.addEventListener('resize', setAppHeight);
  window.addEventListener('orientationchange', function(){ setTimeout(setAppHeight, 250); });
})();
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}

/* ══ IPHONE 16 PRO MAX COLOR SYSTEM ══════════════════════════════════════
   Screen: 430pt wide × 932pt tall | Safe top ~59pt | Safe bottom ~34pt   */
:root{
  /* Backgrounds — deep space */
  --bg:#080713;
  --c1:#121129;
  --c2:#1a1840;
  --c3:#242158;
  --c4:#302b70;

  /* Borders */
  --b1:#2c2862;
  --b2:#3a3478;
  --b3:#5146a3;

  /* ── NEW ACCENT PALETTE ─────────────────────────────── */
  --violet:#8B5CF6;   /* primary actions, Day 1 Push     */
  --violet2:#C4B5FD;  /* soft violet                     */
  --cyan:#00F5D4;     /* completion, progress bars       */
  --cyan2:#67E8F9;    /* lighter cyan                    */
  --coral:#FF477E;    /* energy, danger, Day 4           */
  --coral2:#FF8FAB;   /* lighter coral                   */
  --amber:#FFD166;    /* overload alerts, warnings       */
  --amber2:#FFE29A;   /* lighter amber                   */
  --blue:#38BDF8;     /* Day 2 Pull                      */
  --blue2:#93C5FD;    /* lighter blue                    */
  --pink:#FF4FD8;     /* Day 3 Legs                      */
  --pink2:#FDA4FF;    /* lighter pink                    */
  --green:#22E58E;    /* success states                  */
  --green2:#86EFAC;   /* lighter green                   */
  --red:#FF3B5C;      /* danger                          */

  /* Text */
  --txt:#FFFFFF;
  --txt2:#C6C2EA;
  --txt3:#9690C8;
  --txt4:#303055;

  /* Safe areas — iPhone 16 Pro Max */
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
  --sl:env(safe-area-inset-left,0px);
  --sr:env(safe-area-inset-right,0px);

  /* iPhone 16 Pro Max target: 430 × 932 CSS px */
  --iphone-w:440px;
  --iphone-h:956px;
  --vh:100dvh;

  --f:'DM Sans',system-ui,sans-serif;
}

/* Day accent colors */
.d1{color:var(--violet)}.d2{color:var(--blue)}.d3{color:var(--pink)}.d4{color:var(--coral)}.d5{color:var(--amber)}

html{
  width:100%;
  min-height:100%;
  background:var(--bg);
  overflow:hidden;
}
body{
  width:100%;
  min-height:100%;
  margin:0;
  background:
    radial-gradient(circle at 18% 0%,rgba(255,79,216,.22),transparent 35%),
    radial-gradient(circle at 86% 18%,rgba(0,245,212,.18),transparent 34%),
    radial-gradient(circle at 50% 100%,rgba(255,209,102,.13),transparent 42%),
    linear-gradient(180deg,#120B2E 0%, var(--bg) 42%, #061B22 100%);
  color:var(--txt);
  font-family:var(--f);
  font-size:17px;
  overflow:hidden;
  padding-left:var(--sl);padding-right:var(--sr);
  position:fixed;
  inset:0;
  overscroll-behavior:none;
}
#app{
  display:flex;
  flex-direction:column;
  width:100%;
  height:100vh;
  height:100svh;
  height:100dvh;
  min-height:-webkit-fill-available;
  max-width:none;
  max-height:none;
  position:fixed;
  inset:0;
  overflow:hidden;
  background:
    radial-gradient(circle at 18% 0%,rgba(255,79,216,.22),transparent 35%),
    radial-gradient(circle at 86% 18%,rgba(0,245,212,.18),transparent 34%),
    radial-gradient(circle at 50% 100%,rgba(255,209,102,.13),transparent 42%),
    linear-gradient(180deg,#120B2E 0%, var(--bg) 42%, #061B22 100%);
}
@supports (-webkit-touch-callout:none){
  html{min-height:-webkit-fill-available;}
  body{min-height:-webkit-fill-available;}
  #app{min-height:-webkit-fill-available;}
}

/* ── TOPBAR ─────────────────────────────────────────────────────────── */
.topbar{
  padding:calc(var(--st) + 38px) 20px 14px;
  background:linear-gradient(135deg,rgba(18,11,46,.96),rgba(6,27,34,.94));
  border-bottom:0.5px solid var(--b1);
  flex-shrink:0;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.tb-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:24px;font-weight:700;letter-spacing:-.8px;color:var(--txt)}
.logo em{
  font-style:normal;
  background:linear-gradient(135deg,var(--violet),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.wpill{
  font-size:13px;font-weight:500;color:var(--violet2);
  background:var(--c2);border:0.5px solid var(--b2);
  padding:5px 13px;border-radius:20px;
}
.ptrack{height:3px;background:var(--c3);border-radius:3px;overflow:hidden}
.pfill{
  height:100%;border-radius:3px;transition:width .5s ease;
  background:linear-gradient(90deg,var(--violet),var(--cyan));
}

/* ── SCROLL ─────────────────────────────────────────────────────────── */
.scroll{
  flex:1;
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:0 18px calc(104px + var(--sb));
  overscroll-behavior:contain;
  background:transparent;
}
.scroll::-webkit-scrollbar{display:none}

/* ── BOTTOM NAV ─────────────────────────────────────────────────────── */
.nav{
  display:flex;
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  width:100%;
  background:linear-gradient(135deg,rgba(26,24,64,1),rgba(10,40,48,1));
  border-top:0.5px solid rgba(255,255,255,.10);
  padding-top:10px;
  padding-bottom:calc(var(--sb) + 8px);
  flex-shrink:0;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  z-index:999;
  box-shadow:0 -18px 40px rgba(0,0,0,.28);
}
.nav::after{display:none}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:12px 4px calc(10px + var(--sb));border:none;background:transparent;cursor:pointer;
  color:var(--txt3);font-size:10px;font-family:var(--f);font-weight:500;
  transition:color .2s;
}
.nb.on{color:var(--violet)}
.nb.on svg{filter:drop-shadow(0 0 6px rgba(124,92,252,.5))}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
@media (max-width:380px){.nb{font-size:9px;padding-left:2px;padding-right:2px}.nb svg{width:20px;height:20px}.scroll{padding-left:14px;padding-right:14px}}

/* ── SCREENS ─────────────────────────────────────────────────────────── */
.sc{display:none;padding-top:18px}.sc.on{display:block}
.lbl{
  font-size:11px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--txt3);margin-bottom:10px;padding:0 2px
}

/* ── COMMON CARD ─────────────────────────────────────────────────────── */
.card{
  background:linear-gradient(180deg,rgba(26,24,64,.92),rgba(18,17,41,.96));border:0.5px solid var(--b1);
  border-radius:20px;margin-bottom:12px;overflow:hidden;
}
.card-pad{padding:16px 18px}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px}

/* ── BADGE ────────────────────────────────────────────────────────────── */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge.v{background:rgba(124,92,252,.15);color:var(--violet)}
.badge.cy{background:rgba(0,212,170,.15);color:var(--cyan)}
.badge.co{background:rgba(255,77,109,.15);color:var(--coral)}
.badge.am{background:rgba(255,184,48,.15);color:var(--amber)}
.badge.bl{background:rgba(77,159,255,.15);color:var(--blue)}
.badge.pi{background:rgba(255,108,181,.15);color:var(--pink)}
.badge.gr{background:rgba(46,204,142,.15);color:var(--green)}

/* ── TODAY SCREEN ─────────────────────────────────────────────────────── */
.today-date{font-size:14px;color:var(--violet2);font-weight:500;margin-bottom:12px}

.today-controls{background:linear-gradient(180deg,rgba(26,24,64,.92),rgba(18,17,41,.96));border:0.5px solid var(--b1);border-radius:20px;padding:14px 16px;margin-bottom:12px}
.today-controls-title{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);margin-bottom:10px}
.today-pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.today-select,.today-date-input,.sleep-input{width:100%;padding:13px 12px;border-radius:13px;border:0.5px solid var(--b2);background:var(--c2);color:var(--txt);font-size:15px;font-family:var(--f);outline:none;-webkit-appearance:none}
.today-date-input,.sleep-input{text-align:center}
.sleep-mini{margin-top:12px;background:rgba(0,0,0,.18);border:0.5px solid var(--b2);border-radius:14px;padding:12px}
.sleep-mini label{display:block;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--txt3);margin-bottom:7px}
.back-btn{width:100%;padding:14px;border-radius:14px;border:0.5px solid var(--b2);background:var(--c2);color:var(--txt2);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--f);margin-bottom:10px}

.today-card{
  background:linear-gradient(135deg,rgba(124,92,252,.12),rgba(0,212,170,.06));
  border:1px solid rgba(124,92,252,.3);border-radius:22px;padding:20px;margin-bottom:14px;
}
.today-title{font-size:20px;font-weight:700;margin-bottom:3px}
.today-sub{font-size:14px;color:var(--txt3);margin-bottom:14px}
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.ms{background:rgba(0,0,0,.25);border-radius:14px;padding:12px 8px;text-align:center;border:0.5px solid var(--b2)}
.ms-v{font-size:18px;font-weight:700;margin-bottom:2px}
.ms-l{font-size:11px;color:var(--txt3)}
.start-btn{
  width:100%;padding:17px;border-radius:16px;border:none;
  background:linear-gradient(135deg,var(--violet),var(--cyan));
  color:#fff;font-size:17px;font-weight:700;cursor:pointer;font-family:var(--f);
  letter-spacing:-.2px;
  box-shadow:0 8px 32px rgba(124,92,252,.35);
}
.start-btn:active{opacity:.85;transform:scale(.98)}
.overload-strip{
  background:rgba(255,184,48,.1);border:0.5px solid rgba(255,184,48,.3);
  border-radius:14px;padding:13px 16px;display:flex;align-items:center;gap:12px;margin-bottom:12px;
}
.overload-txt{font-size:14px;color:var(--amber);line-height:1.5}
.week-chart-card{background:linear-gradient(180deg,rgba(26,24,64,.92),rgba(18,17,41,.96));border:0.5px solid var(--b1);border-radius:20px;padding:16px;margin-bottom:12px}
.wbar-wrap{display:flex;align-items:flex-end;gap:8px;height:64px;margin-top:12px}
.wbar-item{display:flex;flex-direction:column;align-items:center;flex:1}
.wbar{width:100%;border-radius:6px 6px 0 0;min-height:4px}
.wbar-lbl{font-size:10px;color:var(--txt3);margin-top:4px;font-family:var(--f);text-align:center}

/* ── DAY CHIPS ─────────────────────────────────────────────────────────── */
.day-row{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 14px;scrollbar-width:none;margin-bottom:4px}
.day-row::-webkit-scrollbar{display:none}
.dc{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;
  padding:12px 16px;border-radius:18px;border:0.5px solid var(--b1);
  background:var(--c1);cursor:pointer;min-width:72px;transition:all .2s;
}
.dc.on{border-width:1.5px}
.dc-n{font-size:11px;color:var(--txt3);font-weight:500;margin-bottom:3px}
.dc-name{font-size:15px;font-weight:700}
.dc-day{font-size:11px;color:var(--txt3);margin-top:3px}

/* ── DAY HEADER ─────────────────────────────────────────────────────────── */
.day-hdr{border-radius:22px;padding:18px 20px;margin-bottom:14px;border:0.5px solid var(--b2)}
.dh-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.dh-name{font-size:24px;font-weight:700;letter-spacing:-.5px}
.dh-pctw{text-align:right}
.dh-pct{font-size:32px;font-weight:700;line-height:1;letter-spacing:-1px}
.dh-pct-l{font-size:11px;color:var(--txt3);margin-top:2px}
.dh-sub{font-size:14px;color:var(--txt3);margin-bottom:12px}
.dh-bar{height:6px;background:var(--c3);border-radius:6px;overflow:hidden}
.dh-bar-f{height:100%;border-radius:6px;transition:width .4s}

/* ── EXERCISE CARD ─────────────────────────────────────────────────────── */
.ex{background:linear-gradient(180deg,rgba(26,24,64,.92),rgba(18,17,41,.96));border:0.5px solid var(--b1);border-radius:20px;margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.ex-head{display:flex;align-items:center;padding:16px 18px;cursor:pointer;gap:14px;min-height:72px}
.ex-ico{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700}
.ex-info{flex:1;min-width:0}
.ex-nm{font-size:16px;font-weight:600;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-mr{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ex-tgt{font-size:12px;color:var(--txt3)}
.ex-pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px}
.ex-pbw{flex:1;min-width:50px;display:flex;align-items:center;gap:6px}
.ex-pb{flex:1;height:4px;background:var(--c3);border-radius:4px;overflow:hidden}
.ex-pb-f{height:100%;border-radius:4px;transition:width .3s}
.ex-pp{font-size:12px;font-weight:600;min-width:32px;text-align:right}
.chev{width:22px;height:22px;display:flex;align-items:center;justify-content:center;color:var(--txt4);transition:transform .2s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}

/* ── EX BODY ─────────────────────────────────────────────────────────── */
.ex-body{padding:0 18px 16px}
.ex-img-wrap{width:100%;border-radius:14px;overflow:hidden;margin-bottom:14px;background:#000;position:relative}
.ex-img{width:100%;display:block;max-height:200px;object-fit:contain}
.watch-btn{
  position:absolute;bottom:10px;right:10px;
  background:rgba(220,0,0,.9);border:none;border-radius:10px;
  padding:8px 14px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;
  font-family:var(--f);display:flex;align-items:center;gap:5px;
}
.ex-tip{
  font-size:13px;color:var(--txt3);font-style:italic;
  border-left:2.5px solid var(--b2);padding-left:12px;margin-bottom:14px;line-height:1.6;
}

/* ── PLAN BAR ─────────────────────────────────────────────────────────── */
.plan-bar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;padding:12px 14px;background:var(--c2);
  border-radius:14px;border:0.5px solid var(--b2);
}
.plan-bar-txt{font-size:13px;color:var(--txt3)}
.plan-edit-btn{
  font-size:12px;font-weight:600;color:var(--violet);
  background:rgba(124,92,252,.12);border:0.5px solid rgba(124,92,252,.3);
  border-radius:8px;padding:6px 12px;cursor:pointer;font-family:var(--f);
}

/* ── SET ROWS ─────────────────────────────────────────────────────────── */
.sh-row{display:grid;grid-template-columns:26px 1fr 46px 1fr 40px 30px;gap:5px;margin-bottom:7px}
.sh{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt4);text-align:center}
.set-row{display:grid;grid-template-columns:26px 1fr 46px 1fr 40px 30px;gap:5px;align-items:center;margin-bottom:7px}
.sn{font-size:14px;font-weight:600;color:var(--txt3);text-align:center}

/* ── STEPPER ─────────────────────────────────────────────────────────── */
.stepper-wrap{display:flex;align-items:center;gap:4px;width:100%}
.step-btn{
  touch-action:manipulation;
  width:38px;height:48px;border-radius:12px;border:0.5px solid var(--b2);
  background:var(--c2);color:var(--txt2);font-size:22px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  flex-shrink:0;font-family:var(--f);transition:all .15s;
  -webkit-user-select:none;user-select:none;
}
.step-btn:active{background:var(--violet);color:#fff;border-color:var(--violet)}
.step-inp{
  flex:1;min-width:0;background:var(--c2);border:0.5px solid var(--b2);border-radius:12px;
  color:var(--txt);font-size:18px;font-family:var(--f);font-weight:600;
  padding:10px 3px;text-align:center;-webkit-appearance:none;outline:none;
  height:48px;transition:border-color .15s,background .15s;
}
.step-inp:focus{border-color:var(--violet2);background:var(--c3)}
.step-inp.ok{background:rgba(0,212,170,.1);border-color:var(--cyan)}
.step-inp.low{background:rgba(255,184,48,.1);border-color:var(--amber)}
.step-inp.bad{background:rgba(255,77,109,.08);border-color:rgba(255,77,109,.4)}
.tgt-lbl{font-size:16px;font-weight:600;color:var(--txt3);text-align:center}
.spct{font-size:12px;font-weight:700;text-align:center;min-width:40px}
.tick{width:38px;height:48px;border-radius:12px;border:0.5px solid var(--b2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.tick.done{border-color:var(--cyan);background:var(--cyan)}
.tick.done svg{color:#000}
.tick svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;color:var(--txt4)}
.dels{width:30px;height:48px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt4);flex-shrink:0}
.dels svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

.btn-row{display:flex;gap:8px;margin-top:12px}
.ghost-btn{
  flex:1;padding:12px;background:transparent;border:0.5px dashed var(--b3);
  border-radius:13px;color:var(--txt3);font-size:13px;cursor:pointer;font-family:var(--f);white-space:nowrap;
}
.complete-btn{
  width:100%;padding:18px;border-radius:18px;border:none;font-size:17px;font-weight:700;
  cursor:pointer;margin-top:16px;font-family:var(--f);color:#fff;letter-spacing:-.2px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);transition:opacity .15s;
}
.complete-btn:active{opacity:.85}

/* ── SESSION HISTORY ─────────────────────────────────────────────────── */
.sess-card{background:linear-gradient(180deg,rgba(26,24,64,.92),rgba(18,17,41,.96));border:0.5px solid var(--b1);border-radius:18px;margin-bottom:10px;overflow:hidden}
.sess-top{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 18px 10px}
.sess-acts{display:flex;gap:6px;flex-shrink:0;margin-left:10px}
.sab{padding:8px 14px;border-radius:10px;border:0.5px solid var(--b2);background:var(--c2);color:var(--txt2);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--f)}
.sab.edit{color:var(--violet);border-color:rgba(124,92,252,.3)}
.sab.del{color:var(--coral);border-color:rgba(255,77,109,.3)}
.sess-ex{display:flex;align-items:center;justify-content:space-between;padding:9px 18px;border-top:0.5px solid var(--b1)}

/* ── CALENDAR ─────────────────────────────────────────────────────────── */
.cal-summary{background:linear-gradient(180deg,rgba(26,24,64,.92),rgba(18,17,41,.96));border:0.5px solid var(--b1);border-radius:20px;padding:18px;margin-bottom:16px}
.cal-sum-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-sum-row:last-child{margin-bottom:0}
.cal-sum-label{font-size:14px;color:var(--txt3)}
.cal-sum-val{font-size:15px;font-weight:600}
.cal-col-headers{display:grid;grid-template-columns:38px repeat(5,1fr);gap:4px;margin-bottom:6px}
.cal-col-hdr{font-size:10px;color:var(--txt3);text-align:center;letter-spacing:.04em;text-transform:uppercase}
.week-row{display:grid;grid-template-columns:38px repeat(5,1fr);gap:4px;margin-bottom:4px;align-items:center}
.week-label{font-size:11px;font-weight:600;color:var(--txt3);text-align:center}
.cal-slot{
  aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  border:0.5px solid var(--b1);background:var(--c1);transition:transform .1s;
}
.cal-slot:active{transform:scale(.93)}
.cal-slot.done{border:none}
.cal-slot.dim{opacity:.2;cursor:default}
.cal-slot .cs-d{font-size:9px;color:rgba(0,0,0,.6);font-weight:600;font-family:var(--f)}
.cal-slot .cs-p{font-size:11px;font-weight:700;color:#000;font-family:var(--f)}
.cal-slot .cs-dt{font-size:8px;color:rgba(0,0,0,.5);font-family:var(--f);margin-top:1px}
.cal-slot.missed{border-color:rgba(255,77,109,.4)}
.cal-slot.current{box-shadow:0 0 0 2px var(--violet)}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;padding:14px;background:var(--c1);border-radius:16px;border:0.5px solid var(--b1)}
.cal-leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3)}
.cal-leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* ── PROGRESS ─────────────────────────────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-box{background:linear-gradient(180deg,rgba(26,24,64,.92),rgba(18,17,41,.96));border:0.5px solid var(--b1);border-radius:18px;padding:18px}
.sv{font-size:30px;font-weight:700;margin-bottom:4px;letter-spacing:-.5px}
.sl{font-size:13px;color:var(--txt3)}
.ex-pick{
  width:100%;padding:14px 16px;border-radius:16px;border:0.5px solid var(--b2);
  background:var(--c1);color:var(--txt);font-size:16px;font-family:var(--f);
  margin-bottom:14px;-webkit-appearance:none;outline:none;
}
.chart-card{background:linear-gradient(180deg,rgba(26,24,64,.92),rgba(18,17,41,.96));border:0.5px solid var(--b1);border-radius:18px;padding:16px;margin-bottom:14px}
.ptbl{width:100%;border-collapse:collapse;font-size:14px}
.ptbl th{color:var(--txt3);font-weight:500;padding:9px 6px;text-align:center;border-bottom:0.5px solid var(--b1);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.ptbl td{padding:12px 6px;text-align:center;border-bottom:0.5px solid var(--b1);color:var(--txt)}
.ptbl tr:last-child td{border-bottom:none}
.up{color:var(--cyan);font-weight:600}.dn{color:var(--coral);font-weight:600}.nc{color:var(--txt3)}

/* ── BODY STATS ─────────────────────────────────────────────────────────── */
.bcard{background:linear-gradient(180deg,rgba(26,24,64,.92),rgba(18,17,41,.96));border:0.5px solid var(--b1);border-radius:20px;padding:20px;margin-bottom:14px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--txt3);font-weight:600;margin-bottom:5px}
.field input{width:100%;padding:13px;border-radius:13px;border:0.5px solid var(--b2);background:var(--c2);color:var(--txt);font-size:16px;font-family:var(--f);text-align:center;-webkit-appearance:none;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--violet2)}
.field input.fl{text-align:left}
.save-b{
  width:100%;padding:16px;border-radius:15px;border:none;
  background:linear-gradient(135deg,var(--violet),var(--cyan));
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--f);
}
.hentry{background:linear-gradient(180deg,rgba(26,24,64,.92),rgba(18,17,41,.96));border:0.5px solid var(--b1);border-radius:18px;padding:16px;margin-bottom:10px}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:10px}
.mi{background:var(--c2);border-radius:12px;padding:10px 5px;text-align:center}
.mi-v{font-size:16px;font-weight:600}
.mi-l{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.mi-d{font-size:11px;font-weight:700;margin-top:2px}

/* ── REPORT ─────────────────────────────────────────────────────────────── */
.week-sum-card{
  background:linear-gradient(135deg,rgba(124,92,252,.12),rgba(0,212,170,.06));
  border:1px solid rgba(124,92,252,.25);border-radius:22px;padding:18px;margin-bottom:14px;
}
.wsc-title{font-size:14px;color:var(--violet2);font-weight:600;margin-bottom:12px}
.wsc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.wsc-box{background:rgba(0,0,0,.25);border-radius:14px;padding:12px;text-align:center;border:0.5px solid var(--b2)}
.wsc-v{font-size:26px;font-weight:700;line-height:1;margin-bottom:4px;letter-spacing:-.5px}
.wsc-l{font-size:11px;color:var(--txt3)}
.rout{
  width:100%;background:linear-gradient(180deg,rgba(26,24,64,.92),rgba(18,17,41,.96));border:0.5px solid var(--b1);border-radius:16px;
  color:var(--txt3);font-size:12px;font-family:monospace;padding:16px;line-height:1.7;
  resize:none;height:220px;outline:none;
}
.gbtn{
  width:100%;padding:16px;border-radius:16px;border:0.5px solid var(--b2);
  background:var(--c2);color:var(--txt);font-size:16px;font-weight:600;cursor:pointer;
  font-family:var(--f);margin-bottom:10px;
}
.cbtn{
  width:100%;padding:16px;border-radius:16px;border:none;
  background:linear-gradient(135deg,var(--violet),var(--cyan));
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--f);
}

/* ── OVERLAYS ─────────────────────────────────────────────────────────── */
.overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.82);z-index:100;
  display:flex;flex-direction:column;justify-content:flex-end;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.sheet{
  background:var(--c1);border-radius:30px 30px 0 0;
  padding:24px 20px calc(var(--sb) + 28px);max-height:88vh;overflow-y:auto;position:relative;
  border-top:0.5px solid var(--b2);
}
.sheet::-webkit-scrollbar{display:none}
.handle{width:44px;height:5px;background:var(--b3);border-radius:3px;margin:0 auto 20px}
.sheet h3{font-size:21px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
.sh-sub{font-size:14px;color:var(--txt3);margin-bottom:20px;line-height:1.5}
.sheet-x{
  position:absolute;top:24px;right:20px;width:36px;height:36px;border-radius:50%;
  border:0.5px solid var(--b2);background:var(--c2);cursor:pointer;font-size:20px;
  color:var(--txt3);display:flex;align-items:center;justify-content:center;
}
.elbl{font-size:12px;font-weight:600;color:var(--violet2);text-transform:uppercase;letter-spacing:.06em;margin:18px 0 9px}

/* ── FATIGUE OVERLAY ─────────────────────────────────────────────────── */
.fatigue-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.85);z-index:200;
  display:flex;flex-direction:column;justify-content:flex-end;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.fatigue-sheet{
  background:var(--c1);border-radius:30px 30px 0 0;
  padding:28px 20px calc(var(--sb) + 30px);
  border-top:0.5px solid var(--b2);
}
.feel-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0}
.feel-card{
  background:var(--c2);border:1px solid var(--b2);border-radius:18px;
  padding:20px 12px;text-align:center;cursor:pointer;transition:all .15s;
}
.feel-card:active{transform:scale(.97)}
.feel-emoji{font-size:32px;margin-bottom:8px}
.feel-label{font-size:16px;font-weight:600;margin-bottom:4px}
.feel-hint{font-size:12px;color:var(--txt3);line-height:1.4}

/* ── DATE SHEET ─────────────────────────────────────────────────────────── */
.date-sheet{
  background:var(--c1);border-radius:30px 30px 0 0;
  padding:28px 20px calc(var(--sb) + 28px);border-top:0.5px solid var(--b2);
}
.date-inp{
  width:100%;padding:18px;border-radius:16px;border:0.5px solid var(--b2);
  background:var(--c2);color:var(--txt);font-size:18px;font-family:var(--f);
  margin-bottom:20px;outline:none;-webkit-appearance:none;text-align:center;
}
.confirm-btn{width:100%;padding:18px;border-radius:16px;border:none;font-size:17px;font-weight:700;cursor:pointer;font-family:var(--f);color:#fff;margin-bottom:10px}
.cancel-btn{width:100%;padding:16px;border-radius:14px;border:0.5px solid var(--b2);background:transparent;color:var(--txt3);font-size:15px;font-weight:500;cursor:pointer;font-family:var(--f)}

/* ── PLAN SHEET ─────────────────────────────────────────────────────────── */
.plan-set-row{display:grid;grid-template-columns:32px 1fr 32px;gap:8px;align-items:center;margin-bottom:9px}
.plan-inp{background:var(--c2);border:0.5px solid var(--b2);border-radius:12px;color:var(--txt);font-size:17px;font-family:var(--f);padding:12px 6px;text-align:center;width:100%;-webkit-appearance:none;outline:none}

.empty{text-align:center;color:var(--txt3);font-size:15px;padding:36px 0;line-height:1.8}
.prog{height:5px;background:var(--c3);border-radius:5px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:5px;transition:width .4s}

function K(d,e){return 'd'+d+'_'+e;}
function ensS(ex,di){
  var k=K(di,ex.id);var plan=getPlan(ex);
  if(!D.sets[k])D.sets[k]=plan.map(function(){return{kg:'',reps:'',done:false};});
  while(D.sets[k].length<plan.length)D.sets[k].push({kg:'',reps:'',done:false});
  while(D.sets[k].length>plan.length)D.sets[k].pop();
  return D.sets[k];
}
function exComp(ex,di){
  var sets=D.sets[K(di,ex.id)]||[];
  var plan=getPlan(ex);
  var tR=plan.reduce(function(a,r){return a+r;},0);
  var aR=sets.reduce(function(a,s){return a+(parseInt(s.reps)||0);},0);
  return{pct:tR?Math.min(100,Math.round(aR/tR*100)):0};
}
function dayPct(day){
  var tT=day.ex.reduce(function(a,e){return a+getPlan(e).reduce(function(b,r){return b+r;},0);},0);
  var aT=day.ex.reduce(function(a,e){return a+(D.sets[K(day.id,e.id)]||[]).reduce(function(b,s){return b+(parseInt(s.reps)||0);},0);},0);
  return tT?Math.min(100,Math.round(aT/tT*100)):0;
}
function getBest(id){var b=0;D.sessions.forEach(function(s){var d=s.exData&&s.exData[id];if(d)d.sets.forEach(function(x){if(x.kg>b)b=x.kg;});});return b||null;}
function getLast(id){for(var i=D.sessions.length-1;i>=0;i--){var d=D.sessions[i].exData&&D.sessions[i].exData[id];if(d){var m=Math.max.apply(null,[0].concat(d.sets.map(function(x){return x.kg;}).filter(function(x){return x>0;})));if(m>0)return m;}}return null;}
function isOverload(exId){
  var v=D.sessions.filter(function(s){return s.exData&&s.exData[exId];});if(v.length<3)return false;
  var last3=v.slice(-3).map(function(s){return Math.max.apply(null,[0].concat(s.exData[exId].sets.map(function(x){return x.kg;}).filter(function(x){return x>0;})));});
  return last3[0]>0&&last3[0]===last3[1]&&last3[1]===last3[2];
}

          +'<button class="dels" onclick="dS(\''+ex.id+'\','+si+')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>';
      });
      h+='<div class="btn-row"><button class="ghost-btn" onclick="aS(\''+ex.id+'\')">+ Add set</button><button class="ghost-btn" onclick="fillT(\''+ex.id+'\')">Fill target reps</button></div></div>';
    }
    h+='</div>';
  });
  h+='<button class="complete-btn" style="background:linear-gradient(135deg,'+c+','+shiftColor(c)+')" onclick="showDatePicker()">Complete '+day.name+' \u2014 '+dp+'% \u2713</button>';
  document.getElementById('day-body').innerHTML=h;
}
function togEx(id){D.ox=D.ox===id?null:id;renderDB();}
function uSBlur(exId,si,f,v,el){
  var k=K(D.ad,exId);if(!D.sets[k])return;
  D.sets[k][si][f]=v;
  if(el)el.value=v;
  refreshSetUI(exId,si);
  refreshDayMiniUI(exId);
  save();
}
function stepV(exId,si,f,delta,btn){
  var k=K(D.ad,exId);if(!D.sets[k])return;
  var cur=parseFloat(D.sets[k][si][f])||0;
  var n=f==='reps'?Math.max(0,Math.round(cur+delta)):Math.max(0,Math.round((cur+delta)*10)/10);
  D.sets[k][si][f]=String(n);
  var inp=document.getElementById('inp-'+exId+'-'+si+'-'+f);
  if(inp)inp.value=String(n);
  refreshSetUI(exId,si);
  refreshDayMiniUI(exId);
  save();
}
function refreshSetUI(exId,si){
  var k=K(D.ad,exId),sets=D.sets[k];if(!sets||!sets[si])return;
  var ex=AEX.find(function(e){return e.id===exId;});if(!ex)return;
  var tR=getTR(exId,si),a=parseInt(sets[si].reps)||0,sp=tR?Math.min(100,Math.round(a/tR*100)):0;
  var inp=document.getElementById('inp-'+exId+'-'+si+'-reps');
  if(inp){
    inp.classList.remove('ok','low','bad');
    if(a>0){inp.classList.add(a>=tR?'ok':a>=tR*.75?'low':'bad');}
  }
  var pct=document.getElementById('pct-'+exId+'-'+si);
  if(pct){pct.textContent=a>0?sp+'%':'—';pct.style.color=a>0?pc(sp):'var(--txt4)';}
}
function refreshDayMiniUI(exId){
  var day=DAYS.find(function(d){return d.id===D.ad;});if(!day)return;
  var dp=dayPct(day),dc=pc(dp);
  var dayPctEl=document.getElementById('day-pct');if(dayPctEl){dayPctEl.textContent=dp+'%';dayPctEl.style.color=dc;}
  var dayBar=document.getElementById('day-bar');if(dayBar){dayBar.style.width=dp+'%';}
  var comp=exComp(AEX.find(function(e){return e.id===exId;})||{},D.ad),ec=pc(comp.pct);
  var ep=document.getElementById('ex-pct-'+exId);if(ep){ep.textContent=comp.pct+'%';ep.style.color=ec;}
  var eb=document.getElementById('ex-bar-'+exId);if(eb){eb.style.width=comp.pct+'%';eb.style.background=ec;}
}
function dS(exId,si){var k=K(D.ad,exId);if(!D.sets[k]||D.sets[k].length<=1)return;D.sets[k].splice(si,1);if(D.plans[exId])D.plans[exId].splice(si,1);save();renderDB();}
function aS(exId){
  var k=K(D.ad,exId);if(!D.sets[k])D.sets[k]=[];
  var prev=D.sets[k][D.sets[k].length-1];
  D.sets[k].push({kg:prev?prev.kg:'',reps:'',done:false});
  var ex=AEX.find(function(e){return e.id===exId;});
  if(!D.plans[exId])D.plans[exId]=getPlan(ex).slice();
  D.plans[exId].push(ex.tR);save();renderDB();
}
function fillT(exId){
  var k=K(D.ad,exId);if(!D.sets[k])return;
  var plan=getPlan(AEX.find(function(e){return e.id===exId;}));
  D.sets[k].forEach(function(s,i){s.reps=String(plan[i]||plan[plan.length-1]||12);});
  save();renderDB();
}

function showDatePicker(){

  var dp=dayPct(day),today=todayISO(),defaultDate=(D.selectedDate||today);
  var sh=document.getElementById('date-sheet');
  sh.innerHTML='<div class="handle"></div>'
    +'<div style="font-size:22px;font-weight:700;color:'+day.color+';margin-bottom:4px">When did you train?</div>'
    +'<div style="font-size:15px;color:var(--txt3);margin-bottom:20px">'+day.name+' \u00b7 '+dp+'% completed'+(D.feelToday?' \u00b7 Felt '+D.feelToday:'')+'</div>'
    +'<input type="date" class="date-inp" id="sess-date" value="'+defaultDate+'" max="'+today+'">'
    +'<button class="confirm-btn" style="background:linear-gradient(135deg,'+day.color+','+shiftColor(day.color)+')" onclick="confirmDate()">Save session \u2713</button>'

  document.getElementById('date-overlay').style.display='flex';

function closeDatePicker(){document.getElementById('date-overlay').style.display='none';}
function confirmDate(){var iso=document.getElementById('sess-date').value;if(!iso){alert('Please pick a date');return;}closeDatePicker();doComplete(iso);}
function doComplete(iso){
  var day=DAYS.find(function(d){return d.id===D.ad;});
  var exData={};

  // IMPORTANT FIX:
  // Calculate the workout completion BEFORE clearing the temporary set data.
  // Previously the app deleted D.sets first, then called dayPct(day), so the
  // saved session became 0% in the Calendar even when the workout was done.
  var finalPct=dayPct(day);

  day.ex.forEach(function(ex){
    var k=K(day.id,ex.id);var plan=getPlan(ex);
    var sets=(D.sets[k]||[]).map(function(s){return{kg:parseFloat(s.kg)||0,reps:parseInt(s.reps)||0};});
    var aR=sets.reduce(function(a,s){return a+s.reps;},0);
    var tR=plan.reduce(function(a,r){return a+r;},0);
    exData[ex.id]={name:ex.name,sets:sets,tR:ex.tR,tS:ex.tS,plan:plan.slice(),pct:tR?Math.min(100,Math.round(aR/tR*100)):0};
  });

  // Now that the completion data has been safely copied to the session,
  // clear only the temporary live workout inputs for this day.
  day.ex.forEach(function(ex){delete D.sets[K(day.id,ex.id)];});

  if(!D.startDate)D.startDate=iso;
  var feel=D.feelToday;D.feelToday=null;
  var sleep=D.sleepToday||'';D.sleepToday='';
  D.sessions.push({date:isoToDisplay(iso),isoDate:iso,dayId:day.id,dayName:day.name,week:D.week,exData:exData,pct:finalPct,feel:feel,sleep:sleep});
  D.ox=null;save();updH();renderDR();renderDB();renderSH();renderToday();
}

      } else if(isCur){

function updSessDate(i,iso){D.sessions[i].isoDate=iso;D.sessions[i].date=isoToDisplay(iso);save();}
function eSV(si,exId,setIdx,f,v){
  if(!D.sessions[si]||!D.sessions[si].exData||!D.sessions[si].exData[exId])return;
  var exD=D.sessions[si].exData[exId];
  exD.sets[setIdx][f]=f==='kg'?parseFloat(v)||0:parseInt(v)||0;
  var plan=exD.plan||Array.from({length:exD.tS||exD.sets.length},function(){return exD.tR||12;});
  exD.pct=Math.min(100,Math.round(exD.sets.reduce(function(a,s){return a+s.reps;},0)/plan.reduce(function(a,r){return a+r;},0)*100));
  var ps=Object.values(D.sessions[si].exData).map(function(e){return e.pct||0;});
  D.sessions[si].pct=Math.round(ps.reduce(function(a,p){return a+p;},0)/ps.length);
  save();openEdit(si);
}
function eStep(si,exId,setIdx,f,delta){
  if(!D.sessions[si]||!D.sessions[si].exData||!D.sessions[si].exData[exId])return;
  var exD=D.sessions[si].exData[exId];
  var cur=parseFloat(exD.sets[setIdx][f])||0;
  exD.sets[setIdx][f]=f==='reps'?Math.max(0,Math.round(cur+delta)):Math.max(0,Math.round((cur+delta)*10)/10);
  var plan=exD.plan||Array.from({length:exD.tS||exD.sets.length},function(){return exD.tR||12;});
  exD.pct=Math.min(100,Math.round(exD.sets.reduce(function(a,s){return a+s.reps;},0)/plan.reduce(function(a,r){return a+r;},0)*100));
  var ps=Object.values(D.sessions[si].exData).map(function(e){return e.pct||0;});
  D.sessions[si].pct=Math.round(ps.reduce(function(a,p){return a+p;},0)/ps.length);
  save();openEdit(si);
}
function eDS(si,exId,setIdx){if(!D.sessions[si].exData[exId].sets||D.sessions[si].exData[exId].sets.length<=1)return;D.sessions[si].exData[exId].sets.splice(setIdx,1);save();openEdit(si);}
function eAS(si,exId){D.sessions[si].exData[exId].sets.push({kg:0,reps:0});save();openEdit(si);}
function closeSheet(){document.getElementById('overlay').style.display='none';renderSH();if(document.getElementById('sc-cal').classList.contains('on'))renderCal();}
function bgClose(e){if(e.target===document.getElementById('overlay'))closeSheet();}

/* PROGRESS */
function rPS(){
  var done=D.sessions.length;
  var vol=D.sessions.reduce(function(a,s){return a+(s.exData?Object.values(s.exData).reduce(function(b,d){return b+d.sets.reduce(function(c,x){return c+x.kg*x.reps;},0);},0):0);},0);
  var stronger=AEX.filter(function(e){
    var v=D.sessions.map(function(s){return s.exData&&s.exData[e.id];}).filter(Boolean);
    if(v.length<2)return false;
    return Math.max.apply(null,v[v.length-1].sets.map(function(s){return s.kg;}))>Math.max.apply(null,v[0].sets.map(function(s){return s.kg;}));
  }).length;
  var avgP=done?Math.round(D.sessions.reduce(function(a,s){return a+(s.pct||0);},0)/done):0;
  document.getElementById('pstats').innerHTML=
    '<div class="stat-box"><div class="sv" style="color:var(--cyan)">'+done+'</div><div class="sl">Sessions done</div></div>'
    +'<div class="stat-box"><div class="sv" style="color:var(--amber)">'+D.week+'</div><div class="sl">Current week</div></div>'
    +'<div class="stat-box"><div class="sv" style="color:var(--blue)">'+(vol>0?Math.round(vol/1000)+'k':'—')+'</div><div class="sl">Volume kg\u00b7reps</div></div>'
    +'<div class="stat-box"><div class="sv" style="color:var(--violet)">'+(avgP?avgP+'%':'—')+'</div><div class="sl">Avg completion</div></div>';
}
function buildPick(){document.getElementById('expick').innerHTML=AEX.map(function(e){return '<option value="'+e.id+'">'+e.name+'</option>';}).join('');}
function renderChart(){
  var exId=document.getElementById('expick').value;
  var ex=AEX.find(function(e){return e.id===exId;});
  var sess=D.sessions.filter(function(s){return s.exData&&s.exData[exId];});
  if(MC){MC.destroy();MC=null;}
  if(!sess.length){document.getElementById('ptbl').innerHTML='<div class="empty">No data yet for '+ex.name+'.<br>Log your first session to track this.</div>';return;}
  var rows=sess.map(function(s){
    var d=s.exData[exId];
    var maxKg=Math.max.apply(null,[0].concat(d.sets.map(function(x){return x.kg;}).filter(function(x){return x>0;})));
    return{date:s.date,week:s.week,maxKg:maxKg,tR:d.sets.reduce(function(a,x){return a+x.reps;},0),vol:Math.round(d.sets.reduce(function(a,x){return a+x.kg*x.reps;},0)),pct:d.pct||0};
  });
  if(typeof Chart==='undefined'){document.getElementById('ptbl').innerHTML='<div class="empty">Chart loading...</div>';return;}
  MC=new Chart(document.getElementById('chart'),{type:'line',data:{labels:rows.map(function(r){return 'Wk'+r.week;}),datasets:[
    {label:'Max kg',data:rows.map(function(r){return r.maxKg;}),borderColor:'#7C5CFC',backgroundColor:'rgba(124,92,252,0.08)',borderWidth:2.5,pointBackgroundColor:'#7C5CFC',pointRadius:5,tension:0.35,fill:true,yAxisID:'y'},
    {label:'Done %',data:rows.map(function(r){return r.pct;}),borderColor:'#00D4AA',backgroundColor:'transparent',borderWidth:1.5,pointBackgroundColor:'#00D4AA',pointRadius:3,tension:0.35,borderDash:[4,3],yAxisID:'y2'},
  ]},options:{responsive:true,interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:true,labels:{color:'#606085',font:{size:12},boxWidth:14,padding:12}},tooltip:{backgroundColor:'#0c0c1e',borderColor:'#262650',borderWidth:1,titleColor:'#A78BFA',bodyColor:'#EEEEF8'}},
    scales:{y:{ticks:{color:'#606085',font:{size:12}},grid:{color:'rgba(255,255,255,0.03)'}},y2:{position:'right',min:0,max:100,ticks:{color:'#606085',font:{size:12},callback:function(v){return v+'%';}},grid:{display:false}},x:{ticks:{color:'#606085',font:{size:12}},grid:{color:'rgba(255,255,255,0.03)'}}}
  }});
  var t='<table class="ptbl"><thead><tr><th>Date</th><th>Wk</th><th>Max kg</th><th>Reps</th><th>Done</th><th>+/-kg</th></tr></thead><tbody>';
  rows.forEach(function(r,i){var prev=rows[i-1];var diff=prev?r.maxKg-prev.maxKg:null;var cls=diff===null?'nc':diff>0?'up':diff<0?'dn':'nc';var arrow=diff===null?'—':diff>0?'+'+diff.toFixed(1):diff.toFixed(1);t+='<tr><td style="color:var(--txt2)">'+r.date+'</td><td>'+r.week+'</td><td style="font-weight:600">'+(r.maxKg||'—')+'</td><td>'+r.tR+'</td><td style="color:'+pc(r.pct)+';font-weight:600">'+r.pct+'%</td><td class="'+cls+'">'+arrow+'</td></tr>';});
  document.getElementById('ptbl').innerHTML=t+'</tbody></table>';
}

/* BODY STATS */
function saveBody(){
  var g=function(id){return parseFloat(document.getElementById(id).value)||null;};
  D.body.push({date:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),week:D.week,weight:g('bw'),fat:g('bf'),neck:g('mn'),shoulders:g('ms'),chest:g('mc'),waist:g('mw'),hips:g('mh'),arm:g('ma'),thigh:g('mt'),calf:g('mca'),note:document.getElementById('bn').value});
  save();['bw','bf','mn','ms','mc','mw','mh','ma','mt','mca','bn'].forEach(function(id){document.getElementById(id).value='';});rBH();
}
function rBH(){
  var el=document.getElementById('bhist');
  if(!D.body.length){el.innerHTML='<div class="empty">No check-ins yet.<br>Log your first measurements above.</div>';return;}
  el.innerHTML=[].concat(D.body).reverse().map(function(s,i,arr){
    var p=arr[i+1];
    function d(a,b){return a&&b?(a-b>0?'+':'')+(a-b).toFixed(1):null;}
    function mi(v,dv,l,lg){if(!v)return'';var dc=dv===null?'nc':parseFloat(dv)<0?(lg?'up':'dn'):parseFloat(dv)>0?(lg?'dn':'up'):'nc';return'<div class="mi"><div class="mi-v">'+v+'</div><div class="mi-l">'+l+'</div>'+(dv!==null?'<div class="mi-d '+dc+'">'+dv+'</div>':'')+'</div>';}
    return'<div class="hentry"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div style="font-size:15px;font-weight:600">Week '+s.week+'</div><div style="font-size:13px;color:var(--txt3)">'+s.date+'</div></div>'
      +(s.note?'<div style="font-size:13px;color:var(--txt3);font-style:italic;margin-bottom:8px">'+s.note+'</div>':'')
      +'<div class="mg">'+mi(s.weight,d(s.weight,p&&p.weight),'Weight',true)+mi(s.fat,d(s.fat,p&&p.fat),'BF %',true)+mi(s.waist,d(s.waist,p&&p.waist),'Waist',true)+mi(s.chest,d(s.chest,p&&p.chest),'Chest',false)+mi(s.arm,d(s.arm,p&&p.arm),'Bicep',false)+mi(s.shoulders,d(s.shoulders,p&&p.shoulders),'Shldrs',false)+mi(s.hips,d(s.hips,p&&p.hips),'Hips',true)+mi(s.thigh,d(s.thigh,p&&p.thigh),'Thigh',false)+mi(s.calf,d(s.calf,p&&p.calf),'Calf',false)+'</div></div>';
  }).join('');
}

/* WEEK SUMMARY */
function buildWeekSummary(){
  var wk=D.week,wkSess=D.sessions.filter(function(s){return s.week===wk;});
  var prevSess=D.sessions.filter(function(s){return s.week===wk-1;});
  if(!D.sessions.length){document.getElementById('week-summary-card').innerHTML='';return;}
  var avgPct=wkSess.length?Math.round(wkSess.reduce(function(a,s){return a+(s.pct||0);},0)/wkSess.length):0;
  var curVol=wkSess.reduce(function(a,s){return a+(s.exData?Object.values(s.exData).reduce(function(b,d){return b+d.sets.reduce(function(c,x){return c+x.kg*x.reps;},0);},0):0);},0);
  var prevVol=prevSess.reduce(function(a,s){return a+(s.exData?Object.values(s.exData).reduce(function(b,d){return b+d.sets.reduce(function(c,x){return c+x.kg*x.reps;},0);},0):0);},0);
  var volChange=prevVol>0?Math.round((curVol-prevVol)/prevVol*100):null;
  var bestLift='',bestDiff=0;
  AEX.forEach(function(ex){
    var v=D.sessions.filter(function(s){return s.exData&&s.exData[ex.id];});if(v.length<2)return;
    var last=Math.max.apply(null,v[v.length-1].sets.map(function(x){return x.kg;}).filter(function(x){return x>0;}));
    var prev=Math.max.apply(null,v[v.length-2].sets.map(function(x){return x.kg;}).filter(function(x){return x>0;}));
    if(last-prev>bestDiff){bestDiff=last-prev;bestLift=ex.name.split(' ').slice(0,2).join(' ')+'+'+(last-prev)+'kg';}
  });
  var missed=[];for(var di=1;di<=5;di++){if(!wkSess.some(function(s){return s.dayId===di;})){var day=DAYS.find(function(d){return d.id===di;});missed.push(day.name);}}
  document.getElementById('week-summary-card').innerHTML='<div class="week-sum-card">'
    +'<div class="wsc-title">Week '+wk+' of 12 \u2014 recap</div>'
    +'<div class="wsc-grid">'
    +'<div class="wsc-box"><div class="wsc-v" style="color:var(--cyan)">'+wkSess.length+'/5</div><div class="wsc-l">Sessions</div></div>'
    +'<div class="wsc-box"><div class="wsc-v" style="color:var(--amber)">'+(avgPct?avgPct+'%':'—')+'</div><div class="wsc-l">Avg done</div></div>'
    +'<div class="wsc-box"><div class="wsc-v" style="color:'+(volChange!==null&&volChange>0?'var(--green)':'var(--coral)')+'">'+( volChange!==null?(volChange>0?'+':'')+volChange+'%':'—')+'</div><div class="wsc-l">Vol vs Wk'+(wk-1)+'</div></div>'
    +'<div class="wsc-box"><div class="wsc-v" style="color:var(--violet2);font-size:'+(bestLift.length>8?'16px':'24px')+'">'+( bestLift||'—')+'</div><div class="wsc-l">Best lift</div></div>'
    +'</div>'
    +(missed.length?'<div style="font-size:14px;color:var(--coral);line-height:1.5">Missed: '+missed.join(', ')+'</div>'
    :'<div style="font-size:14px;color:var(--cyan)">\u2713 Perfect week \u2014 all 5 sessions done!</div>')
    +'</div>';
}

/* REPORT */
function buildReport(){
  var L=[];
  L.push('=== RAED\'S 12-WEEK RECOMP REPORT ===');
  L.push(new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}));
  L.push('Week '+D.week+'/12 | Sessions: '+D.sessions.length+'/60');
  L.push('Started: '+(D.startDate?isoToDisplay(D.startDate):'not started'));
  if(D.sessions.length)L.push('Avg completion: '+Math.round(D.sessions.reduce(function(a,s){return a+(s.pct||0);},0)/D.sessions.length)+'%');
  L.push('');
  if(D.body.length){
    var f=D.body[0],l=D.body[D.body.length-1];
    L.push('--- BODY ---');
    L.push('Start Wk'+f.week+': '+(f.weight||'?')+'kg | BF '+(f.fat||'?')+'% | Waist '+(f.waist||'?')+'cm | Chest '+(f.chest||'?')+'cm | Bicep '+(f.arm||'?')+'cm');
    L.push('Latest Wk'+l.week+': '+(l.weight||'?')+'kg | BF '+(l.fat||'?')+'% | Waist '+(l.waist||'?')+'cm | Chest '+(l.chest||'?')+'cm | Bicep '+(l.arm||'?')+'cm');
    if(f.weight&&l.weight)L.push('Weight change: '+(l.weight-f.weight).toFixed(1)+'kg');
    L.push('');
  }
  L.push('--- STRENGTH & COMPLETION ---');
  AEX.forEach(function(ex){
    var v=D.sessions.filter(function(s){return s.exData&&s.exData[ex.id];});if(!v.length)return;
    var vals=v.map(function(s){return{wk:s.week,max:Math.max.apply(null,[0].concat(s.exData[ex.id].sets.map(function(x){return x.kg;}).filter(function(x){return x>0;}))),pct:s.exData[ex.id].pct||0};});
    var fi=vals[0],li=vals[vals.length-1];var diff=li.max-fi.max;
    L.push(ex.name+': '+fi.max+'\u2192'+li.max+'kg ('+(diff>=0?'+':'')+diff.toFixed(1)+'kg) | Avg: '+Math.round(vals.reduce(function(a,v){return a+v.pct;},0)/vals.length)+'%');
  });
  L.push('');
  var missed=[];for(var wk=1;wk<=D.week;wk++){DAYS.forEach(function(day){if(!D.sessions.some(function(s){return s.dayId===day.id&&s.week===wk;}))missed.push('Wk'+wk+' Day '+day.id+' '+day.name);});}
  if(missed.length){L.push('--- MISSED ---');missed.forEach(function(m){L.push('- '+m);});L.push('');}
  L.push('--- SESSION LOG ---');
  D.sessions.forEach(function(s){var vol=s.exData?Object.values(s.exData).reduce(function(a,d){return a+d.sets.reduce(function(b,x){return b+x.kg*x.reps;},0);},0):0;L.push('Wk'+s.week+' | '+s.date+' | '+s.dayName+' | '+(s.pct||0)+'%'+(s.feel?' | '+s.feel:'')+' | Vol:'+Math.round(vol));});
  document.getElementById('rout').value=L.join('\n');
}
function copyReport(){var t=document.getElementById('rout').value;if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){alert('Copied! Paste to Claude for analysis.');});}else{var el=document.getElementById('rout');el.select();document.execCommand('copy');alert('Copied!');}}
/* iOS viewport fix: keeps the app exactly inside the visible iPhone screen,
   including when Safari toolbars show/hide or when installed to Home Screen. */
function setIPhoneViewport(){
  /* Use the larger value so Safari's toolbar does not leave a short app with an empty band at the bottom. */
  var vv = window.visualViewport ? window.visualViewport.height : 0;
  var h = Math.max(window.innerHeight || 0, vv || 0);
  document.documentElement.style.setProperty('--vh', h + 'px');
}
setIPhoneViewport();
window.addEventListener('resize', setIPhoneViewport);
window.addEventListener('orientationchange', setIPhoneViewport);
if(window.visualViewport){window.visualViewport.addEventListener('resize', setIPhoneViewport);}

function setTodayDate(v){
  if(!v)return;
  D.selectedDate=v;
  var d=new Date(v+'T00:00:00');
  var map={0:1,1:2,2:3,4:4,5:5};
  if(map[d.getDay()])D.ad=map[d.getDay()];
  save();renderToday();renderDR();renderDB();
}
function setTodayDay(v){D.ad=parseInt(v)||1;save();renderToday();renderDR();renderDB();}
function setSleepToday(v){D.sleepToday=v;save();}

load();
