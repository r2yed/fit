<style>

@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap');

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

:root{

  --safe-top:env(safe-area-inset-top);
  --safe-bottom:env(safe-area-inset-bottom);

  /* LIGHTER BACKGROUNDS */
  --bg:#0E1324;
  --c1:#1A2140;
  --c2:#242D57;
  --c3:#313D73;
  --c4:#445292;

  /* BORDERS */
  --b1:#445292;
  --b2:#5668B0;
  --b3:#7085D8;

  /* COLORS */
  --violet:#9B7BFF;
  --violet2:#C6B5FF;

  --cyan:#4DEBFF;
  --cyan2:#9AF6FF;

  --blue:#74B3FF;
  --blue2:#B4D5FF;

  --pink:#FF89E5;
  --pink2:#FFC5F2;

  --coral:#FF7E98;
  --coral2:#FFB5C3;

  --amber:#FFD36B;
  --amber2:#FFE7A8;

  --green:#57F0AE;
  --green2:#A6FFD7;

  --txt:#FFFFFF;
  --txt2:#E0E6FF;
  --txt3:#B7C0E8;
  --txt4:#7E8BC5;
}

html{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
}

body{

  width:100%;
  height:100%;
  overflow:hidden;

  font-family:'DM Sans',sans-serif;

  background:
    radial-gradient(circle at top left,#33407A 0%,#0E1324 45%),
    radial-gradient(circle at bottom right,#26315C 0%,#0E1324 40%);

  color:var(--txt);

  position:fixed;
  inset:0;

  -webkit-font-smoothing:antialiased;

  overscroll-behavior:none;
}

#app{

  width:100%;
  height:100dvh;

  display:flex;
  flex-direction:column;

  overflow:hidden;

  position:relative;
}

/* TOP BAR */

.topbar{

  padding:
    calc(var(--safe-top) + 38px)
    20px
    16px;

  background:
    rgba(26,33,64,.75);

  backdrop-filter:blur(24px);

  border-bottom:
    1px solid rgba(255,255,255,.08);

  flex-shrink:0;
}

.logo{
  font-size:30px;
  font-weight:800;
  letter-spacing:-1px;
  color:white;
}

.logo em{

  font-style:normal;

  background:
    linear-gradient(
      135deg,
      var(--violet),
      var(--cyan)
    );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* SCROLL */

.scroll{

  flex:1;

  overflow-y:auto;
  overflow-x:hidden;

  padding:
    20px
    18px
    140px;

  -webkit-overflow-scrolling:touch;

  scrollbar-width:none;
}

.scroll::-webkit-scrollbar{
  display:none;
}

/* TODAY CARD */

.today-card{

  background:
    linear-gradient(
      135deg,
      rgba(155,123,255,.28),
      rgba(77,235,255,.16)
    );

  border:
    1px solid rgba(255,255,255,.10);

  border-radius:30px;

  padding:24px;

  margin-bottom:18px;

  backdrop-filter:blur(22px);

  box-shadow:
    0 12px 50px rgba(0,0,0,.25),
    0 0 30px rgba(155,123,255,.18);
}

/* CARDS */

.card,
.ex,
.chart-card,
.stat-box,
.bcard,
.sess-card,
.week-chart-card{

  background:
    rgba(26,33,64,.75);

  border:
    1px solid rgba(255,255,255,.08);

  border-radius:28px;

  backdrop-filter:blur(18px);

  box-shadow:
    0 10px 40px rgba(0,0,0,.22);
}

/* BUTTONS */

.start-btn,
.complete-btn,
.save-b,
.cbtn{

  width:100%;

  padding:18px;

  border:none;

  border-radius:22px;

  color:white;

  font-size:18px;
  font-weight:800;

  background:
    linear-gradient(
      135deg,
      var(--violet),
      var(--cyan)
    );

  box-shadow:
    0 10px 40px rgba(155,123,255,.35),
    0 0 24px rgba(77,235,255,.16);

  transition:all .2s ease;
}

.start-btn:active,
.complete-btn:active{
  transform:scale(.98);
}

/* NAVIGATION */

.nav{

  position:fixed;

  left:0;
  right:0;
  bottom:0;

  background:
    rgba(26,33,64,.82);

  backdrop-filter:blur(30px);

  border-top:
    1px solid rgba(255,255,255,.08);

  padding-top:10px;

  padding-bottom:
    calc(var(--safe-bottom) + 10px);

  display:flex;

  z-index:999;
}

.nb{

  flex:1;

  border:none;
  background:none;

  color:var(--txt4);

  display:flex;
  flex-direction:column;

  align-items:center;

  gap:5px;

  padding:10px 4px;

  font-size:11px;
  font-weight:700;
}

.nb.on{
  color:var(--cyan);
}

/* INPUTS */

input,
select,
textarea{

  background:rgba(255,255,255,.06);

  border:
    1px solid rgba(255,255,255,.10);

  color:white;

  border-radius:18px;

  outline:none;
}

/* OVERLAYS */

.overlay,
.fatigue-overlay{

  position:fixed;
  inset:0;

  background:
    rgba(0,0,0,.55);

  backdrop-filter:blur(14px);

  z-index:1000;
}

.sheet,
.fatigue-sheet,
.date-sheet{

  background:
    linear-gradient(
      180deg,
      #242D57,
      #1A2140
    );

  border-radius:34px 34px 0 0;

  padding:
    28px
    20px
    calc(var(--safe-bottom) + 30px);

  border-top:
    1px solid rgba(255,255,255,.08);
}

/* DAY COLORS */

.d1{color:#9B7BFF}
.d2{color:#74B3FF}
.d3{color:#FF89E5}
.d4{color:#FF7E98}
.d5{color:#FFD36B}

/* LABELS */

.lbl{
  color:var(--txt3);
}

/* GLOW EFFECT */

.card:hover,
.ex:hover{

  box-shadow:
    0 0 30px rgba(77,235,255,.10),
    0 0 18px rgba(155,123,255,.12);
}

</style>
